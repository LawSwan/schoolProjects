services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra_db_PA
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=LocalCluster
      - CASSANDRA_NUM_TOKENS=256
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' 127.0.0.1 9042 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  cassandra_data: